name: Phase2 - Alpine Real Partition Image Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-alpine-image:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Image & Partition Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y dosfstools mtools zip wget parted kpartx

    - name: Download Alpine Linux for RPi
      run: |
        mkdir -p alpine_files
        wget https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/aarch64/alpine-rpi-3.20.0-aarch64.tar.gz
        tar -xf alpine-rpi-3.20.0-aarch64.tar.gz -C alpine_files

    - name: Inject Custom Boot UI and Scripts
      run: |
        chmod +x setup.sh
        ./setup.sh ./alpine_files

    - name: Generate Real MBR Bootable Image
      run: |
        # 🫙 250MBの空イメージを作成
        dd if=/dev/zero of=alpine-pure-installer.img bs=1M count=250
        
        # 🗺️ ラズパイ5が必須とする「MBR形式の地図（パーティション）」を刻む
        sudo parted alpine-pure-installer.img --script mklabel msdos
        sudo parted alpine-pure-installer.img --script mkpart primary fat32 1MiB 100%
        
        # ⚙️ ドライブを仮想的にマウントしてFAT32でクリーンフォーマット
        LOOP_DEV=$(sudo losetup -f --show alpine-pure-installer.img)
        sudo kpartx -av $LOOP_DEV
        
        # 🧼 パーティションをフォーマット
        sudo mkfs.vfat -F 32 /dev/mapper/$(basename $LOOP_DEV)p1
        
        # 📂 Alpineの全ファイルを「地図で区切られた正しい部屋」に流し込む
        mkdir -p mnt
        sudo mount /dev/mapper/$(basename $LOOP_DEV)p1 mnt
        sudo cp -r alpine_files/* mnt/
        sudo umount mnt
        
        # 🔓 後片付けをして権限を解放
        sudo kpartx -d $LOOP_DEV
        sudo losetup -d $LOOP_DEV
        sudo chmod 666 alpine-pure-installer.img
        
        # 📦 Chromebookで焼きやすいようにZIPに圧縮
        zip alpine-final-installer.zip alpine-pure-installer.img

    - name: Upload Installer Package
      uses: actions/upload-artifact@v4
      with:
        name: phase2-clean-image
        path: alpine-final-installer.zip
