name: Custom RPi5 OS (Direct Modification)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動ビルドボタン

jobs:
  modify-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Official Raspberry Pi OS
      run: |
        sudo apt update && sudo apt install -y wget unzip
        # 🌟 ラズパイ5対応の公式軽量OS（Bookworm Lite）を直接ダウンロード
        wget -O raspios.img.xz https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2024-11-19/2024-11-19-raspios-bookworm-arm64-lite.img.xz
        xz -d raspios.img.xz

    - name: Setup Mount Tools
      run: |
        sudo apt install -y kpartx

    - name: Inject Custom Settings
      run: |
        # 🌟 イメージファイルの内部に直接アクセスする魔法のコマンド
        sudo losetup -P -f raspios.img
        LOOP_DEV=$(sudo losetup -a | grep "raspios.img" | awk -F: '{print $1}' | head -n 1)
        
        # システム領域（第2パーティション）を一時的にマウント
        sudo mkdir -p /mnt/rootfs
        sudo mount ${LOOP_DEV}p2 /mnt/rootfs

        # 💡 自動起動で「画面」と「ブラウザ」だけを立ち上げる超軽量カスタム
        sudo mkdir -p /mnt/rootfs/etc/X11/Xwrapper.config.d
        echo "allowed_users=anybody" | sudo tee -a /mnt/rootfs/etc/X11/Xwrapper.config
        
        # 起動時に自作SNSとTurboWarpを2画面表示で直接開くための設定をここに仕込みます
        sudo mkdir -p /mnt/rootfs/root/.xinitrc
        
        # 念のため最初からデスクトップ用の最小パーツ（Xorg、ブラウザ）が入るようにマーク
        sudo touch /mnt/rootfs/boot/ssh # ついでに遠隔操作用のSSHも有効化
        
        # 後片付け
        sudo umount /mnt/rootfs
        sudo losetup -d ${LOOP_DEV}

    - name: Compress and Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: pi5-perfect-os
        path: raspios.img
