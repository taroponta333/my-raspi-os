name: Phase2 - Custom Minimal Boot Installer Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-custom-boot:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sed make binutils build-essential gcc g++ bash patch gzip bzip2 perl tar cpio unzip rsync file bc wget libncurses5-dev libssl-dev

    - name: Download and Setup Buildroot
      run: |
        # Buildrootの安定版を確保
        wget https://buildroot.org/downloads/buildroot-2024.02.2.tar.gz
        tar -xf buildroot-2024.02.2.tar.gz
        mv buildroot-2024.02.2 buildroot

    - name: Configure Buildroot for Raspberry Pi 5
      run: |
        cd buildroot
        # ラズパイ4/5向けのベース設定を適用 (64bit環境)
        make raspberrypi4_64_defconfig
        
        # 🌟 インストーラーに必要な最小限のGUIとツールを強制有効化
        echo "BR2_PACKAGE_XORG7=y" >> .config
        echo "BR2_PACKAGE_XSERVER_XORG_SERVER=y" >> .config
        echo "BR2_PACKAGE_XAPP_TWM=y" >> .config
        echo "BR2_PACKAGE_ZENITY=y" >> .config
        echo "BR2_PACKAGE_BUSYBOX_SHOW_OTHERS=y" >> .config
        echo "BR2_PACKAGE_BASH=y" >> .config
        echo "BR2_PACKAGE_WGET=y" >> .config
        echo "BR2_PACKAGE_CURL=y" >> .config
        echo "BR2_PACKAGE_UTIL_LINUX=y" >> .config
        echo "BR2_PACKAGE_UTIL_LINUX_BINARIES=y" >> .config
        
        # 設定を再検証
        make olddefconfig

    - name: Inject Custom Boot Script
      run: |
        chmod +x setup.sh
        ./setup.sh ./buildroot

    - name: Compile Custom OS (Phase 2 Core)
      run: |
        cd buildroot
        # カーネルとルートファイルシステムをコンパイル (少し時間がかかります)
        make

    - name: Upload Custom Boot Image
      uses: actions/upload-artifact@v4
      with:
        name: phase2-pure-installer
        path: buildroot/output/images/sdcard.img
