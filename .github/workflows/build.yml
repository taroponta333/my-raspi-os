name: Custom RPi5 Mod OS Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Base OS
      run: |
        sudo apt update && sudo apt install -y wget unzip kpartx
        wget -O raspios.img.xz https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2024-11-19/2024-11-19-raspios-bookworm-arm64-lite.img.xz
        xz -d raspios.img.xz

    - name: Inject Custom Script (setup.sh)
      run: |
        sudo losetup -P -f raspios.img
        LOOP_DEV=$(sudo losetup -a | grep "raspios.img" | awk -F: '{print $1}' | head -n 1)
        
        sudo mkdir -p /mnt/rootfs
        sudo mount ${LOOP_DEV}p2 /mnt/rootfs

        chmod +x setup.sh
        ./setup.sh /mnt/rootfs

        sudo umount /mnt/rootfs
        sudo losetup -d ${LOOP_DEV}

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: pi5-mod-os
        path: raspios.img
