name: Phase2 - Alpine Ultra-Lightweight Installer Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-alpine-installer:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Alpine Linux for RPi (aarch64)
      run: |
        mkdir -p deploy
        # ラズパイ5に対応した最新の超軽量Alpine Linuxのパッケージを取得
        wget https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/aarch64/alpine-rpi-3.20.0-aarch64.tar.gz
        tar -xf alpine-rpi-3.20.0-aarch64.tar.gz -C deploy

    - name: Inject Custom Boot UI and Scripts
      run: |
        chmod +x setup.sh
        ./setup.sh ./deploy

    - name: Create Flashable Zip
      run: |
        cd deploy
        # Chromebookのリカバリーユーティリティでそのまま焼けるZIP形式に圧縮
        zip -r ../alpine-rpi5-installer.zip ./*

    - name: Upload Installer Package
      uses: actions/upload-artifact@v4
      with:
        name: phase2-alpine-installer
        path: alpine-rpi5-installer.zip
