name: Phase2 - Alpine Non-Sudo Image Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-alpine-image:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Pure Creation Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y dosfstools mtools zip wget parted

    - name: Download Alpine Linux for RPi
      run: |
        mkdir -p alpine_files
        wget https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/aarch64/alpine-rpi-3.20.0-aarch64.tar.gz
        tar -xf alpine-rpi-3.20.0-aarch64.tar.gz -C alpine_files

    - name: Inject Custom Boot UI and Scripts
      run: |
        chmod +x setup.sh
        ./setup.sh ./alpine_files

    - name: Generate Perfect Image (Docking Method)
      run: |
        # 1. 全体となる250MBの空の台座（イメージ）を作成
        dd if=/dev/zero of=alpine-pure-installer.img bs=1M count=250
        
        # 2. 台座にラズパイ5用の「MBR地図（パーティション）」を刻む（sudo不要）
        parted alpine-pure-installer.img --script mklabel msdos
        parted alpine-pure-installer.img --script mkpart primary fat32 1MiB 100%
        
        # 3. 【ここが秘密兵器】中身のデータ部屋（249MB）を「単体のファイル」として別に作成
        dd if=/dev/zero of=partition.img bs=1M count=249
        mkfs.vfat -F 32 partition.img
        
        # 4. データ部屋の中にAlpineの全ファイルを流し込む（sudo不要）
        mcopy -i partition.img -s alpine_files/* ::/
        
        # 5. 完成したデータ部屋を、台座の1MB目（seek=1）の場所にダイレクトにドッキング！
        dd if=partition.img of=alpine-pure-installer.img bs=1M seek=1 conv=notrunc
        
        # 6. 後片付けをしてZIP圧縮
        rm partition.img
        zip alpine-final-installer.zip alpine-pure-installer.img

    - name: Upload Installer Package
      uses: actions/upload-artifact@v4
      with:
        name: phase2-clean-image
        path: alpine-final-installer.zip
