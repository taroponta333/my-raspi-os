name: Build My Custom Pi 5 OS (Pi-Gen)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動ビルドボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y coreutils quilt parted qemu-user-static debootstrap zero-free cxxtest

    - name: Clone pi-gen (Raspberry Pi OS Builder)
      run: |
        git clone https://github.com/RPi-Distro/pi-gen.git --depth=1 pi-gen

    - name: Configure custom OS
      run: |
        cd pi-gen
        # ラズパイ5用の設定を作成
        echo "IMG_NAME='Custom-Pi5-OS'" > config
        
        # 🌟 ここがポイント：ムダなアプリ（LibreOfficeなど）を省き、
        # 最低限のデスクトップ画面とブラウザ、ファイルマネージャーだけを入れる指示
        echo "STAGE_LIST='stage0 stage1 stage2'" >> config
        
        # 不要な標準ゲームやオフィスソフトのインストールをスキップして軽量化
        touch stage2/SKIP_IMAGES

    - name: Run Build (pi-gen)
      run: |
        cd pi-gen
        # 管理者権限で安全にビルドを実行
        sudo ./build.sh

    - name: Upload SD Card Image
      uses: actions/upload-artifact@v4
      with:
        name: pi5-custom-os
        # 生成されたZIP形式のSDカードイメージを指定
        path: pi-gen/deploy/*.zip
        if-no-files-found: ignore
