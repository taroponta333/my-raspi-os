name: Build My Custom Pi 5 OS (Serverless)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動でビルドを開始するボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential libncurses-dev rsync git bc \
          cpio unzip python3 m4 wget ca-certificates

    - name: Clone Raspberry Pi Official Buildroot
      run: |
        git clone https://github.com/raspberrypi/buildroot.git --depth=1 buildroot

    - name: Configure Buildroot
      run: |
        cd buildroot
        # 🌟 グラフィック環境（X11/Openbox/ブラウザ）が最初から全部揃っている公式デモ設定を読み込みます
        make raspberrypi5_qt5_defconfig
        
        # 設定を確定させる（エラーを回避）
        make olddefconfig

    - name: Run Build
      run: |
        cd buildroot
        # コンパイルを実行
        make

    - name: Upload SD Card Image
      uses: actions/upload-artifact@v4
      with:
        name: pi5-serverless-os
        path: buildroot/output/images/sdcard.img
        if-no-files-found: ignore
